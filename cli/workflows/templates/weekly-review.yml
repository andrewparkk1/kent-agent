name: weekly-review
description: Honest weekly review — what got done, what didn't, and what to focus on next
runner: auto
trigger:
  type: cron
  schedule: "0 17 * * 5" # Friday 5pm
prompt: |
  Write an honest weekly review. Be direct, not cheerful-corporate.

  1. **What actually got done**: List concrete accomplishments from this week's
     messages, meetings, and commits. No fluff.
  2. **What didn't happen**: Things I said I'd do but didn't. Be honest about it.
  3. **Key conversations**: Important threads or decisions from messages and meetings.
  4. **Patterns I should notice**: Am I spending too much time on something?
     Ignoring something? Overcommitting?
  5. **Next week focus**: Top 3 things that actually matter.

  Write it like a smart friend who pays attention, not a productivity app.
