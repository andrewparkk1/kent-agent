name: vip-digest
description: Evening digest of important messages from key contacts
runner: auto
trigger:
  type: cron
  schedule: "0 20 * * *" # 8pm daily
prompt: |
  Review today's messages across all sources (iMessage, Signal, email, Slack).
  Surface only the important ones I might have missed:

  1. **Messages from VIPs**: Direct messages from close contacts, family, key
     colleagues — especially any that haven't been replied to
  2. **Time-sensitive items**: Anything with a deadline or expiring invitation
  3. **Emotional signals**: Messages that seem urgent, upset, or important
     based on tone
  4. **Action items buried in threads**: Requests or commitments I may have
     glossed over

  Skip routine/automated messages. Only surface things a thoughtful assistant
  would flag as "you should probably see this."
